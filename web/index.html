<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>로컬 CPU 챗봇</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
    }
    .chat-wrap {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .chat-header {
      background: #111827;
      color: white;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: bold;
    }
    .chat-box {
      height: 600px;
      overflow-y: auto;
      padding: 20px;
      background: #f9fafb;
    }
    .msg {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .msg.user { align-items: flex-end; }
    .msg.bot { align-items: flex-start; }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble {
      background: #2563eb;
      color: white;
    }
    .bot .bubble {
      background: #e5e7eb;
      color: #111827;
    }
    .chat-input {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }
    .chat-input textarea {
      flex: 1;
      resize: none;
      height: 60px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }
    .chat-input button {
      width: 120px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    .chat-input button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #6b7280;
      padding: 0 20px 16px;
    }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-header">로컬 CPU 챗봇 (llama.cpp)</div>
    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <textarea id="message" placeholder="질문을 입력하세요"></textarea>
      <button id="sendBtn" onclick="sendChat()">전송</button>
    </div>

    <div class="status" id="status">준비됨</div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const statusBox = document.getElementById("status");

    let isSending = false;
    let isComposing = false;
    let chatHistory = [];

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      msg.appendChild(bubble);
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendChat() {
      const message = messageInput.value.trim();

      if (!message) return;
      if (isSending) return;

      isSending = true;
      sendBtn.disabled = true;
      statusBox.textContent = "응답 생성 중...";

      addMessage("user", message);
      messageInput.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: message,
            history: chatHistory,
            use_rag: true
          })
        });

        const data = await res.json();

        if (!res.ok) {
          addMessage("bot", `오류: ${data.detail || "알 수 없는 오류"}`);
        } else {
          addMessage("bot", data.response || "응답이 비어 있습니다.");

          chatHistory.push({
            role: "user",
            content: message
          });

          chatHistory.push({
            role: "assistant",
            content: data.response || ""
          });
        }
      } catch (err) {
        addMessage("bot", `요청 실패: ${err}`);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        statusBox.textContent = "준비됨";
        messageInput.focus();
      }
    }

    messageInput.addEventListener("compositionstart", () => {
      isComposing = true;
    });

    messageInput.addEventListener("compositionend", () => {
      isComposing = false;
    });

    messageInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        if (isComposing || e.isComposing) return;
        e.preventDefault();
        sendChat();
      }
    });

    addMessage("bot", "안녕하세요. 로컬 CPU 챗봇입니다.");
  </script>
</body>
</html>
